<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2.9 — Costo de llamada</title>
  <link rel="stylesheet" href="../styles/main.css" />
</head>
<body>
  <div class="page-wrapper">

    <header class="problem-header">
      <p class="problem-number">Problema 2.9</p>
      <h1 class="problem-title">Costo de llamada telefónica</h1>
    </header>

    <div class="card">
      <p class="card-title">Datos</p>

      <div class="field">
        <label for="minutos">Duración de la llamada (minutos)</label>
        <input type="number" id="minutos" min="0" step="any" placeholder="ej. 15" />
        <p class="error-msg" id="errMinutos">Ingresa una duración válida (> 0).</p>
      </div>

      <div class="field">
        <label for="costoPorMinuto">Costo por minuto ($)</label>
        <input type="number" id="costoPorMinuto" min="0" step="any" placeholder="ej. 2.50" />
        <p class="error-msg" id="errCosto">Ingresa un costo válido (> 0).</p>
      </div>

      <button class="btn-primary" onclick="calcularCosto()">Calcular</button>

      <div class="result-block" id="resultBlock">
        <div class="result-row"><span>Duración</span><span id="resMinutos">—</span></div>
        <div class="result-row"><span>Costo por minuto</span><span id="resCostoPorMinuto">—</span></div>
        <div class="result-total">
          <span class="label">Total a pagar</span>
          <span class="amount" id="resTotal">—</span>
        </div>
      </div>
    </div>

  </div>
  <script src="../scripts/P2.9.js"></script>
</body>
</html>

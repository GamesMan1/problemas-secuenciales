<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2.4 — Estacionamiento</title>
  <link rel="stylesheet" href="../styles/main.css" />
</head>
<body>
  <div class="page-wrapper">

    <header class="problem-header">
      <p class="problem-number">Problema 2.4</p>
      <h1 class="problem-title">Cobro de estacionamiento</h1>
    </header>

    <div class="card">
      <p class="card-title">Datos</p>

      <div class="field">
        <label for="tarifaHora">Tarifa por hora ($)</label>
        <input type="number" id="tarifaHora" min="0" step="any" placeholder="ej. 25" />
        <p class="error-msg" id="errTarifa">Ingresa una tarifa válida (> 0).</p>
      </div>

      <div class="field">
        <label for="horas">Horas utilizadas</label>
        <input type="number" id="horas" min="0" step="any" placeholder="ej. 1.5" />
        <p class="error-msg" id="errHoras">Ingresa un tiempo válido (> 0).</p>
      </div>

      <button class="btn-primary" onclick="calcularCobro()">Calcular</button>

      <div class="result-block" id="resultBlock">
        <div class="result-row"><span>Horas cobradas</span><span id="resHoras">—</span></div>
        <div class="result-total">
          <span class="label">Total a cobrar</span>
          <span class="amount" id="resTotal">—</span>
        </div>
      </div>
    </div>

  </div>
  <script src="../scripts/P2.4.js"></script>
</body>
</html>

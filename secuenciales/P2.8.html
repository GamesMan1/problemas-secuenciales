<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2.8 — Tiempo en bicicleta</title>
  <link rel="stylesheet" href="../styles/main.css" />
</head>
<body>
  <div class="page-wrapper">

    <header class="problem-header">
      <p class="problem-number">Problema 2.8</p>
      <h1 class="problem-title">Tiempo de viaje en bicicleta</h1>
    </header>

    <div class="card">
      <p class="card-title">Datos</p>

      <div class="field">
        <label for="distancia">Distancia entre ciudades (km)</label>
        <input type="number" id="distancia" min="0" step="any" placeholder="ej. 60" />
        <p class="error-msg" id="errDistancia">Ingresa una distancia válida (> 0).</p>
      </div>

      <div class="field">
        <label for="velocidad">Velocidad constante (km/h)</label>
        <input type="number" id="velocidad" min="0" step="any" placeholder="ej. 20" />
        <p class="error-msg" id="errVelocidad">Ingresa una velocidad válida (> 0).</p>
      </div>

      <button class="btn-primary" onclick="calcularTiempo()">Calcular</button>

      <div class="result-block" id="resultBlock">
        <div class="result-row"><span>Distancia</span><span id="resDistancia">—</span></div>
        <div class="result-row"><span>Velocidad</span><span id="resVelocidad">—</span></div>
        <div class="result-total">
          <span class="label">Tiempo estimado</span>
          <span class="amount" id="resTiempo">—</span>
        </div>
      </div>
    </div>

  </div>
  <script src="../scripts/P2.8.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2.5 — La brocha gorda</title>
  <link rel="stylesheet" href="../styles/main.css" />
</head>
<body>
  <div class="page-wrapper">

    <header class="problem-header">
      <p class="problem-number">Problema 2.5</p>
      <h1 class="problem-title">Pinturas "La brocha gorda"</h1>
    </header>

    <div class="card">
      <p class="card-title">Datos del presupuesto</p>

      <div class="field">
        <label for="cliente">Nombre del cliente</label>
        <input type="text" id="cliente" placeholder="ej. Juan Pérez" />
        <p class="error-msg" id="errCliente">Ingresa el nombre del cliente.</p>
      </div>

      <div class="field">
        <label for="metros">Superficie a pintar (m²)</label>
        <input type="number" id="metros" min="0" step="any" placeholder="ej. 45" />
        <p class="error-msg" id="errMetros">Ingresa una superficie válida (> 0).</p>
      </div>

      <div class="field">
        <label for="preciom2">Precio por m² ($)</label>
        <input type="number" id="preciom2" min="0" step="any" placeholder="ej. 80" />
        <p class="error-msg" id="errPrecio">Ingresa un precio válido (> 0).</p>
      </div>

      <button class="btn-primary" onclick="generarPresupuesto()">Generar presupuesto</button>

      <div class="result-block" id="resultBlock">
        <div class="result-row"><span>Cliente</span><span id="resCliente">—</span></div>
        <div class="result-row"><span>Superficie</span><span id="resMetros">—</span></div>
        <div class="result-row"><span>Precio por m²</span><span id="resPrecio">—</span></div>
        <div class="result-total">
          <span class="label">Total del presupuesto</span>
          <span class="amount" id="resTotal">—</span>
        </div>
      </div>
    </div>

  </div>
  <script src="../scripts/P2.5.js"></script>
</body>
</html>
